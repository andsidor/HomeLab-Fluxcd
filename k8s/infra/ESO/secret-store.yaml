---
# ClusterSecretStore dla Google Secret Manager
# Ten SecretStore jest dostępny dla wszystkich namespace'ów w klastrze
apiVersion: external-secrets.io/v1beta1
kind: ClusterSecretStore
metadata:
  name: gcpsm-cluster-secret-store
spec:
  provider:
    gcpsm:
      projectID: "mysecret-476812"
      auth:
        secretRef:
          secretAccessKeySecretRef:
            name: gcp-credentials
            namespace: external-secrets
            key: secret-access-credentials

---
# Alternatywnie: SecretStore dla konkretnego namespace'u z SecretRef (dla kompatybilności)
# Użyj tego jeśli Workload Identity nie jest dostępna
