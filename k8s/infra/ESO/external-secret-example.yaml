---
# Przykład 1: Prosty ExternalSecret - pojedynczy secret
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: demo-api-key
  namespace: default  # Zmień na docelowy namespace
spec:
  refreshInterval: 15m
  secretStoreRef:
    name: gcpsm-cluster-secret-store
    kind: ClusterSecretStore
  target:
    name: demo-api-key
    creationPolicy: Owner
    template:
      engineVersion: v2
      data:
        api-key: "{{ .apiKeyValue }}"
  data:
    - secretKey: apiKeyValue
      remoteRef:
        key: demo-api-key  # Nazwa sekretu w Google Secret Manager

---
# Przykład 2: ExternalSecret z wieloma sekretami
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: database-credentials
  namespace: default  # Zmień na docelowy namespace
spec:
  refreshInterval: 15m
  secretStoreRef:
    name: gcpsm-cluster-secret-store
    kind: ClusterSecretStore
  target:
    name: database-credentials
    creationPolicy: Owner
    template:
      engineVersion: v2
      data:
        DATABASE_URL: "{{ .dbUrl }}"
        DB_USER: "{{ .dbUser }}"
        DB_PASSWORD: "{{ .dbPassword }}"
  data:
    - secretKey: dbUrl
      remoteRef:
        key: demo-database-url
    - secretKey: dbUser
      remoteRef:
        key: database-user
    - secretKey: dbPassword
      remoteRef:
        key: database-password

---
# Przykład 3: ExternalSecret z JSON parsowaniem
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: app-config
  namespace: default  # Zmień na docelowy namespace
spec:
  refreshInterval: 15m
  secretStoreRef:
    name: gcpsm-cluster-secret-store
    kind: ClusterSecretStore
  target:
    name: app-config
    creationPolicy: Owner
    template:
      engineVersion: v2
      data:
        config.json: |
          {
            "apiKey": "{{ .appConfigApiKey }}",
            "endpoint": "{{ .appConfigEndpoint }}"
          }
  dataFrom:
    - extract:
        key: app-config-json  # Sekrety w Google Secret Manager w formacie JSON

---
# Przykład 4: ExternalSecret z labelami dla łatwej identyfikacji
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: redis-credentials
  namespace: default
  labels:
    app: redis
    environment: production
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: gcpsm-cluster-secret-store
    kind: ClusterSecretStore
  target:
    name: redis-credentials
    creationPolicy: Owner
  data:
    - secretKey: redis-url
      remoteRef:
        key: redis-url
    - secretKey: redis-password
      remoteRef:
        key: redis-password
