apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: external-secrets

resources:
  - namespace.yaml
  - helm-repository.yaml
  - helm-release.yaml

labels:
  - pairs:
      app.kubernetes.io/name: external-secrets
      app.kubernetes.io/component: secret-management
    includeSelectors: true
