---
# ExternalSecret: MongoDB Connection URL
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: mongodb-url
  namespace: default
spec:
  refreshInterval: 15m
  secretStoreRef:
    name: gcpsm-cluster-secret-store
    kind: ClusterSecretStore
  target:
    name: mongodb-url
    creationPolicy: Owner
    template:
      engineVersion: v2
      data:
        url: "{{ .mongodbUrl }}"
  data:
    - secretKey: mongodbUrl
      remoteRef:
        key: homelab-mongodb-url

---
# ExternalSecret: API Key
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: api-key
  namespace: default
spec:
  refreshInterval: 15m
  secretStoreRef:
    name: gcpsm-cluster-secret-store
    kind: ClusterSecretStore
  target:
    name: api-key
    creationPolicy: Owner
    template:
      engineVersion: v2
      data:
        api-key: "{{ .apiKey }}"
  data:
    - secretKey: apiKey
      remoteRef:
        key: homelab-api-key

---
# ExternalSecret: JSON Credentials (simple version - extract whole JSON)
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: homelab-credentials
  namespace: default
spec:
  refreshInterval: 15m
  secretStoreRef:
    name: gcpsm-cluster-secret-store
    kind: ClusterSecretStore
  target:
    name: homelab-credentials
    creationPolicy: Owner
  data:
    - secretKey: credentials
      remoteRef:
        key: homelab-credentials
