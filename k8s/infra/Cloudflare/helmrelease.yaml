apiVersion: helm.toolkit.fluxcd.io/v2beta2
kind: HelmRelease
metadata:
  name: cloudflared
  namespace: cloudflared
spec:
  interval: 10m
  releaseName: cloudflared

  chart:
    spec:
      chart: cloudflared
      version: "*"
      sourceRef:
        kind: HelmRepository
        name: cloudflare
        namespace: flux-system

  valuesFrom:
    - kind: ConfigMap
      name: cloudflared-values
