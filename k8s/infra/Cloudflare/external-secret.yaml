# ExternalSecret: Cloudflare Tunnel Credentials
# Synchronizuje credentials z Google Secret Manager do Kubernetes
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: cloudflare-tunnel-credentials
  namespace: cloudflare
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: gcpsm-cluster-secret-store
    kind: ClusterSecretStore
  target:
    name: cloudflare-tunnel-credentials
    creationPolicy: Owner
    template:
      engineVersion: v2
      data:
        credentials.json: "{{ .credentials }}"
  data:
    - secretKey: credentials
      remoteRef:
        key: cloudflare-tunnel-credentials

---
# ExternalSecret: Cloudflare Token
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: cloudflare-token
  namespace: cloudflare
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: gcpsm-cluster-secret-store
    kind: ClusterSecretStore
  target:
    name: cloudflare-token
    creationPolicy: Owner
  data:
    - secretKey: token
      remoteRef:
        key: cloudflare-tunnel-token
