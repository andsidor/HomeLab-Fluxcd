# ExternalSecret: Cloudflare Token (Token-based method)
# Synchronizuje tunnel token z Google Secret Manager do Kubernetes
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: cloudflare-tunnel
  namespace: cloudflare
spec:
  refreshInterval: 15m
  secretStoreRef:
    name: gcpsm-cluster-secret-store
    kind: ClusterSecretStore
  target:
    name: cloudflare-tunnel-secret
    creationPolicy: Owner
    template:
      engineVersion: v2
      data:
        token: "{{ .tunnel_token }}"
  data:
  - secretKey: tunnel_token
    remoteRef:
      key: cloudflare-tunnel-token
