apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: headlamp
  namespace: headlamp
spec:
  interval: 30m
  chart:
    spec:
      chart: headlamp
      version: '0.4*'
      sourceRef:
        kind: HelmRepository
        name: headlamp
        namespace: headlamp
  values:
    replicaCount: 1
    service:
      type: LoadBalancer
    ingress:
      enabled: true
      ingressClassName: traefik
      hosts:
        - host: lamp.andrzejsidor.online
          paths:
            - path: /
              type: ImplementationSpecific
