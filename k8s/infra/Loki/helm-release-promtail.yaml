apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: promtail
  namespace: loki
spec:
  interval: 30m
  chart:
    spec:
      chart: promtail
      version: '6.*'
      sourceRef:
        kind: HelmRepository
        name: grafana
        namespace: loki
  values:
    config:
      clients:
        - url: http://loki.loki.svc.cluster.local:3100/loki/api/v1/push
    resources:
      requests:
        cpu: 50m
        memory: 64Mi
      limits:
        cpu: 100m
        memory: 128Mi
