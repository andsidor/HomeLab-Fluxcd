apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: longhorn
  namespace: longhorn-system
spec:
  interval: 30m
  chart:
    spec:
      chart: longhorn
      version: '1.6.*'
      sourceRef:
        kind: HelmRepository
        name: longhorn
        namespace: longhorn-system
  values:
    defaultSettings:
      defaultReplicaCount: 2
      defaultDataPath: /var/lib/longhorn
    persistence:
      defaultClass: false
      defaultClassReplicaCount: 2
