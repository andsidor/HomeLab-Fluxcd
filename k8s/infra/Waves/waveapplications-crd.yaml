apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: waveapplications.gitops.k8s.io
  annotations:
    api-approved.kubernetes.io: "https://github.com/kubernetes/kubernetes/pull/78458"
spec:
  group: gitops.k8s.io
  names:
    kind: WaveApplication
    listKind: WaveApplicationList
    plural: waveapplications
    singular: waveapplication
  scope: Namespaced
  versions:
  - name: v1alpha1
    served: true
    storage: true
    schema:
      openAPIV3Schema:
        type: object
        properties:
          spec:
            type: object
            properties:
              sourceRef:
                type: object
                properties:
                  kind:
                    type: string
                  name:
                    type: string
                  namespace:
                    type: string
              path:
                type: string
              waves:
                type: array
                items:
                  type: object
                  properties:
                    name:
                      type: string
                    order:
                      type: integer
              suspend:
                type: boolean
              interval:
                type: string
          status:
            type: object
            properties:
              observedGeneration:
                type: integer
              conditions:
                type: array
                items:
                  type: object
                  properties:
                    type:
                      type: string
                    status:
                      type: string
                    lastTransitionTime:
                      type: string
                      format: date-time
                    reason:
                      type: string
                    message:
                      type: string
              lastAppliedRevision:
                type: string
    subresources:
      status: {}
    additionalPrinterColumns:
    - name: Ready
      type: string
      jsonPath: .status.conditions[?(@.type=="Ready")].status
    - name: Age
      type: date
      jsonPath: .metadata.creationTimestamp
