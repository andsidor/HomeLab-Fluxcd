apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: waveenvironments.gitops.k8s.io
  annotations:
    api-approved.kubernetes.io: "https://github.com/kubernetes/kubernetes/pull/78458"
spec:
  group: gitops.k8s.io
  names:
    kind: WaveEnvironment
    listKind: WaveEnvironmentList
    plural: waveenvironments
    singular: waveenvironment
  scope: Namespaced
  versions:
  - name: v1alpha1
    served: true
    storage: true
    schema:
      openAPIV3Schema:
        type: object
        properties:
          spec:
            type: object
            properties:
              name:
                type: string
              description:
                type: string
              clusterRef:
                type: object
                properties:
                  name:
                    type: string
                  namespace:
                    type: string
              applications:
                type: array
                items:
                  type: object
                  properties:
                    name:
                      type: string
                    namespace:
                      type: string
              promotionOrder:
                type: array
                items:
                  type: string
          status:
            type: object
            properties:
              ready:
                type: boolean
              conditions:
                type: array
                items:
                  type: object
                  properties:
                    type:
                      type: string
                    status:
                      type: string
                    lastTransitionTime:
                      type: string
                      format: date-time
                    reason:
                      type: string
                    message:
                      type: string
              applications:
                type: array
                items:
                  type: object
                  properties:
                    name:
                      type: string
                    status:
                      type: string
    subresources:
      status: {}
    additionalPrinterColumns:
    - name: Ready
      type: boolean
      jsonPath: .status.ready
    - name: Age
      type: date
      jsonPath: .metadata.creationTimestamp
