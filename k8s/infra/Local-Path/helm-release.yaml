apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: local-path-provisioner
  namespace: local-path-storage
spec:
  interval: 30m
  chart:
    spec:
      chart: local-path-provisioner
      version: '0.0.30'
      sourceRef:
        kind: HelmRepository
        name: rancher
        namespace: local-path-storage
  values:
    storageClass:
      defaultClass: true
      name: local-path
      reclaimPolicy: Delete
    helperImage:
      repository: busybox
      tag: "1.36"
