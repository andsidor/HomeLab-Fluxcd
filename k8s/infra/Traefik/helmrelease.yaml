apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: traefik
  namespace: traefik
spec:
  interval: 5m
  chart:
    spec:
      chart: traefik
      version: "39.x"
      sourceRef:
        kind: HelmRepository
        name: traefik
        namespace: flux-system
  values:
    providers:
      kubernetesIngress:
        enabled: true
      kubernetesCRD:
        enabled: true

    ingressClass:
      enabled: true
      isDefaultClass: true
      name: traefik

    service:
      type: LoadBalancer

    ports:
      web:
        port: 80
      websecure:
        port: 443
