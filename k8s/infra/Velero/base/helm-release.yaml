apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: velero
  namespace: velero
spec:
  interval: 30m
  chart:
    spec:
      chart: velero
      version: '7.*'
      sourceRef:
        kind: HelmRepository
        name: velero
        namespace: velero
  values:
    credentials:
      useSecret: true
      existingSecret: velero-gcp-credentials
    configuration:
      backupStorageLocation:
        - name: default
          provider: gcp
          bucket: homelab-k8s-storage-bucket-sidor
          config:
            serviceAccount: /credentials/cloud
            prefix: velero
    deployNodeAgent: true
    initContainers:
      - name: velero-plugin-for-gcp
        image: velero/velero-plugin-for-gcp:v1.13.2
        volumeMounts:
          - mountPath: /target
            name: plugins
    kubectl:
      image:
        repository: docker.io/bitnami/kubectl
        tag: 1.34.3
