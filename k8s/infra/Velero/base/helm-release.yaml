apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: velero
  namespace: velero
spec:
  interval: 30m
  chart:
    spec:
      chart: velero
      version: "5.*"
      sourceRef:
        kind: HelmRepository
        name: vmware-tanzu
        namespace: velero
  values:
    kubectl:
      image:
        tag: "latest"
    upgradeCRDs: false
    initContainers:
      - name: velero-plugin-for-gcp
        image: velero/velero-plugin-for-gcp:v1.9.2
        imagePullPolicy: IfNotPresent
        volumeMounts:
          - mountPath: /target
            name: plugins
    configuration:
      backupStorageLocation:
        - name: default
          provider: gcp
          bucket: homelab-k8s-storage-bucket-sidor
          accessMode: ReadWrite
      volumeSnapshotLocation:
        - name: default
          provider: gcp
    credentials:
      existingSecret: velero-gcp-credentials
