apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: velero-schedules
  namespace: flux-system
spec:
  dependsOn:
    - name: velero-base
  interval: 10m
  path: ./k8s/infra/Velero/schedules
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
  wait: true
  timeout: 5m
