apiVersion: v1
kind: Service
metadata:
  name: weave-gitops-loadbalancer
  namespace: weave-gitops
spec:
  type: LoadBalancer
  selector:
    app.kubernetes.io/name: weave-gitops
  ports:
    - name: http
      port: 80
      targetPort: 9001
      protocol: TCP
    - name: https
      port: 443
      targetPort: 9001
      protocol: TCP
