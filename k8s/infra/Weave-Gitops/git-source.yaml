# Installation Methods for Weave GitOps
#
# Method 1: Using Weave GitOps CLI (Recommended)
# curl --silent --location "https://github.com/weaveworks/weave-gitops/releases/download/v0.35.0/weave-gitops-$(uname)-$(uname -m)" -o weave-gitops
# chmod +x weave-gitops
# ./weave-gitops gitops install --export
#
# Method 2: Using Helm (with proper image registry access)
# helm repo add weave-gitops https://charts.weave.works
# helm repo update
# helm install weave-gitops weave-gitops/weave-gitops -n weave-gitops
#
# Method 3: Manual Installation (see README.md)
