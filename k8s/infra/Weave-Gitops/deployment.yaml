apiVersion: v1
kind: ServiceAccount
metadata:
  name: weave-gitops
  namespace: weave-gitops
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: weave-gitops
rules:
- apiGroups:
  - ""
  resources:
  - namespaces
  - pods
  - services
  - configmaps
  - secrets
  - serviceaccounts
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - apps
  resources:
  - deployments
  - daemonsets
  - statefulsets
  - replicasets
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - source.toolkit.fluxcd.io
  resources:
  - gitrepositories
  - helmrepositories
  - buckets
  - helmcharts
  - ocirepositories
  verbs:
  - get
  - list
  - watch
  - patch
- apiGroups:
  - kustomize.toolkit.fluxcd.io
  resources:
  - kustomizations
  verbs:
  - get
  - list
  - watch
  - patch
- apiGroups:
  - helm.toolkit.fluxcd.io
  resources:
  - helmreleases
  verbs:
  - get
  - list
  - watch
  - patch
- apiGroups:
  - notification.toolkit.fluxcd.io
  resources:
  - providers
  - alerts
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - image.toolkit.fluxcd.io
  resources:
  - imagepolicies
  - imagerepositories
  - imageupdateautomations
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - apiextensions.k8s.io
  resources:
  - customresourcedefinitions
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - ""
  resources:
  - users
  - groups
  - serviceaccounts
  verbs:
  - impersonate
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: weave-gitops
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: weave-gitops
subjects:
- kind: ServiceAccount
  name: weave-gitops
  namespace: weave-gitops
---
# Secrets are now managed by External Secrets Operator
# See external-secret.yaml for configuration
# Secrets will be created from Google Secret Manager:
# - cluster-user-auth
# - weave-gitops-admin-password
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: weave-gitops
  namespace: weave-gitops
  labels:
    app.kubernetes.io/name: weave-gitops
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: weave-gitops
  template:
    metadata:
      labels:
        app.kubernetes.io/name: weave-gitops
    spec:
      serviceAccountName: weave-gitops
      containers:
      - name: weave-gitops
        image: ghcr.io/weaveworks/wego-app:v0.35.0
        imagePullPolicy: IfNotPresent
        args:
        - "--insecure"
        - "--log-level=info"
        ports:
        - name: http
          containerPort: 9001
          protocol: TCP
        livenessProbe:
          httpGet:
            path: /
            port: http
          initialDelaySeconds: 10
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /
            port: http
          initialDelaySeconds: 5
          periodSeconds: 5
        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            cpu: 500m
            memory: 512Mi
        env:
        - name: WEAVE_GITOPS_FEATURE_TENANCY
          value: "false"
        - name: WEAVE_GITOPS_FEATURE_CLUSTER
          value: "false"
        volumeMounts:
        - name: auth
          mountPath: /run/secrets/auth
      volumes:
      - name: auth
        secret:
          secretName: weave-gitops-admin-password
---
apiVersion: v1
kind: Service
metadata:
  name: weave-gitops
  namespace: weave-gitops
  labels:
    app.kubernetes.io/name: weave-gitops
spec:
  type: ClusterIP
  ports:
  - name: http
    port: 9001
    targetPort: http
    protocol: TCP
  selector:
    app.kubernetes.io/name: weave-gitops
