apiVersion: apps/v1
kind: Deployment
metadata:
  name: weave-gitops
  namespace: weave-gitops
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: weave-gitops
  template:
    metadata:
      labels:
        app.kubernetes.io/name: weave-gitops
    spec:
      serviceAccountName: weave-gitops
      containers:
      - name: weave-gitops
        image: ghcr.io/weaveworks/weave-gitops:latest
        ports:
        - name: http
          containerPort: 8080
        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            cpu: 500m
            memory: 512Mi
        env:
        - name: WEAVE_GITOPS_FEATURE_CLUSTER
          value: "true"
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: weave-gitops
  namespace: weave-gitops
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: weave-gitops
rules:
- apiGroups:
  - ""
  resources:
  - namespaces
  - services
  - configmaps
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - "*"
  resources:
  - '*'
  verbs:
  - get
  - list
  - watch
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: weave-gitops
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: weave-gitops
subjects:
- kind: ServiceAccount
  name: weave-gitops
  namespace: weave-gitops
---
apiVersion: v1
kind: Service
metadata:
  name: weave-gitops
  namespace: weave-gitops
spec:
  type: ClusterIP
  ports:
  - name: http
    port: 80
    targetPort: http
  selector:
    app.kubernetes.io/name: weave-gitops
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: weave-gitops
  namespace: weave-gitops
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    traefik.ingress.kubernetes.io/router.tls.certresolver: letsencrypt
spec:
  ingressClassName: traefik
  rules:
  - host: gitops.example.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: weave-gitops
            port:
              number: 80
