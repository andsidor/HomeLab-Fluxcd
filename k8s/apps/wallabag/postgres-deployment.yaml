apiVersion: apps/v1
kind: Deployment
metadata:
  name: wallabag-postgres
  namespace: wallabag
  labels:
    app: wallabag-postgres
spec:
  replicas: 1
  selector:
    matchLabels:
      app: wallabag-postgres
  template:
    metadata:
      labels:
        app: wallabag-postgres
    spec:
      containers:
        - name: postgres
          image: postgres:16
          imagePullPolicy: IfNotPresent
          ports:
            - name: db
              containerPort: 5432
          env:
            - name: POSTGRES_DB
              valueFrom:
                secretKeyRef:
                  name: wallabag-db-credentials
                  key: database
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: wallabag-db-credentials
                  key: username
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: wallabag-db-credentials
                  key: password
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          volumeMounts:
            - name: postgres-data
              mountPath: /var/lib/postgresql/data
      volumes:
        - name: postgres-data
          persistentVolumeClaim:
            claimName: wallabag-postgres-data
