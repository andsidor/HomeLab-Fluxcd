apiVersion: apps/v1
kind: Deployment
metadata:
  name: wallabag
  namespace: wallabag
  labels:
    app: wallabag
spec:
  replicas: 1
  selector:
    matchLabels:
      app: wallabag
  template:
    metadata:
      labels:
        app: wallabag
    spec:
      containers:
        - name: wallabag
          image: wallabag/wallabag:2.6.7
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 80
          env:
            - name: SYMFONY__ENV__DOMAIN_NAME
              value: http://wallabag.local
            - name: SYMFONY__ENV__DATABASE_DRIVER
              value: pdo_pgsql
            - name: SYMFONY__ENV__DATABASE_HOST
              value: wallabag-postgres
            - name: SYMFONY__ENV__DATABASE_PORT
              value: "5432"
            - name: SYMFONY__ENV__DATABASE_NAME
              valueFrom:
                secretKeyRef:
                  name: wallabag-db-credentials
                  key: database
            - name: SYMFONY__ENV__DATABASE_USER
              valueFrom:
                secretKeyRef:
                  name: wallabag-db-credentials
                  key: username
            - name: SYMFONY__ENV__DATABASE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: wallabag-db-credentials
                  key: password
            - name: SYMFONY__ENV__DATABASE_CHARSET
              value: utf8
            - name: SYMFONY__ENV__DATABASE_TABLE_PREFIX
              value: wallabag_
            - name: SYMFONY__ENV__FOSUSER_REGISTRATION
              value: "false"
          volumeMounts:
            - name: wallabag-data
              mountPath: /var/www/wallabag/data
      volumes:
        - name: wallabag-data
          persistentVolumeClaim:
            claimName: wallabag-data
