apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: gitlab
  namespace: gitlab
spec:
  interval: 30m
  chart:
    spec:
      chart: gitlab
      version: '8.*'
      sourceRef:
        kind: HelmRepository
        name: gitlab
        namespace: gitlab
  values:
    global:
      edition: ce
      hosts:
        domain: lab.local
      ingress:
        class: traefik
        configureCertmanager: false
        tls:
          enabled: false

    certmanager:
      install: false

    nginx-ingress:
      enabled: false

    prometheus:
      install: false

    gitlab-runner:
      install: false

    registry:
      enabled: false

    minio:
      enabled: false
