apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: grafana
  namespace: grafana
spec:
  interval: 30m
  chart:
    spec:
      chart: grafana
      version: '7.*'
      sourceRef:
        kind: HelmRepository
        name: grafana
        namespace: grafana
  values:
    replicaCount: 1

    resources:
      limits:
        cpu: 200m
        memory: 256Mi
      requests:
        cpu: 100m
        memory: 128Mi

    datasources:
      datasources.yaml:
        apiVersion: 1
        datasources:
          - name: Prometheus
            type: prometheus
            url: http://kube-prometheus-stack-prometheus.prometheus.svc.cluster.local:9090
            access: proxy
            isDefault: true

    dashboardProviders:
      dashboardproviders.yaml:
        apiVersion: 1
        providers:
          - name: 'default'
            orgId: 1
            folder: ''
            type: file
            disableDeletion: false
            updateIntervalSeconds: 10
            allowUiUpdates: true
            options:
              path: /var/lib/grafana/dashboards/default

    dashboardsConfigMap:
      - name: grafana-node-dashboard
        key: node-cpu-memory-dashboard.json

    dashboards:
      default:
        kubernetes-cluster:
          gnetId: 7249
          revision: 1
          datasource: Prometheus
        node-exporter:
          gnetId: 1860
          revision: 23
          datasource: Prometheus

    adminPassword: changeme

    persistence:
      enabled: true
      type: pvc
      size: 5Gi
      accessModes:
        - ReadWriteOnce

    ingress:
      enabled: true
      ingressClassName: traefik
      path: /
      pathType: Prefix
      hosts:
        - grafana.lab.local
      annotations:
        traefik.ingress.kubernetes.io/router.entrypoints: websecure
        traefik.ingress.kubernetes.io/router.tls: "true"
        cert-manager.io/cluster-issuer: letsencrypt-prod
      tls:
        - secretName: grafana-tls
          hosts:
            - grafana.lab.local
