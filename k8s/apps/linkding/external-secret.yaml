apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: linkding-credentials
  namespace: linkding
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: gcpsm-cluster-secret-store
    kind: ClusterSecretStore
  target:
    name: linkding-credentials
    creationPolicy: Owner
  data:
    - secretKey: username
      remoteRef:
        key: linkding-username
    - secretKey: password
      remoteRef:
        key: linkding-password
