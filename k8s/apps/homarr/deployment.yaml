apiVersion: apps/v1
kind: Deployment
metadata:
  name: homarr
  namespace: homarr
  labels:
    app: homarr
spec:
  replicas: 1
  selector:
    matchLabels:
      app: homarr
  template:
    metadata:
      labels:
        app: homarr
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "7575"
        prometheus.io/path: "/"
    spec:
      containers:
        - name: homarr
          image: ghcr.io/ajnart/homarr:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 7575
              protocol: TCP
          env:
            - name: NODE_ENV
              value: "production"
            - name: PORT
              value: "7575"
          livenessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 3
          readinessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 10
            periodSeconds: 5
            failureThreshold: 3
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 1Gi
          volumeMounts:
            - name: homarr-config
              mountPath: /app/data/configs
            - name: homarr-icons
              mountPath: /app/public/icons
            - name: homarr-data
              mountPath: /data
      volumes:
        - name: homarr-config
          emptyDir: {}
        - name: homarr-icons
          emptyDir: {}
        - name: homarr-data
          emptyDir: {}
