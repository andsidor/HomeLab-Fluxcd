---
apiVersion: v1
kind: ConfigMap
metadata:
  name: demo-app-config
  namespace: demo2
data:
  app.py: |
    import os
    import json
    from flask import Flask, jsonify
    
    app = Flask(__name__)
    
    @app.route('/health', methods=['GET'])
    def health():
        return jsonify({'status': 'healthy'}), 200
    
    @app.route('/secrets', methods=['GET'])
    def get_secrets():
        """Endpoint pokazujący pobranie sekretów z Google Secret Manager"""
        api_key = os.getenv('API_KEY', 'NOT_FOUND')
        database_url = os.getenv('DATABASE_URL', 'NOT_FOUND')
        
        return jsonify({
            'message': 'Sekrety pobrane z Google Secret Manager przez External Secrets Operator',
            'api_key_present': api_key != 'NOT_FOUND',
            'database_url_present': database_url != 'NOT_FOUND',
            'app': 'demo2',
        }), 200
    
    @app.route('/config', methods=['GET'])
    def config():
        """Endpoint pokazujący konfigurację aplikacji"""
        return jsonify({
            'environment': os.getenv('ENVIRONMENT', 'development'),
            'namespace': os.getenv('NAMESPACE', 'unknown'),
            'pod_name': os.getenv('POD_NAME', 'unknown'),
        }), 200
    
    if __name__ == '__main__':
        app.run(host='0.0.0.0', port=5000, debug=False)
