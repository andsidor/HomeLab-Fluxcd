---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: demo-app
  namespace: demo2
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: demo-app
  template:
    metadata:
      labels:
        app: demo-app
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "5000"
    spec:
      serviceAccountName: demo-app
      containers:
      - name: demo-app
        image: python:3.11-slim
        imagePullPolicy: IfNotPresent
        workingDir: /app
        command: 
        - sh
        - -c
        - |
          pip install flask gunicorn &&
          python app.py
        ports:
        - containerPort: 5000
          name: http
        env:
        - name: ENVIRONMENT
          value: "production"
        - name: NAMESPACE
          valueFrom:
            fieldRef:
              fieldPath: metadata.namespace
        - name: POD_NAME
          valueFrom:
            fieldRef:
              fieldPath: metadata.name
        # Sekrety pobrane z Google Secret Manager przez External Secrets Operator
        - name: API_KEY
          valueFrom:
            secretKeyRef:
              name: demo-app-secret
              key: API_KEY
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: demo-app-secret
              key: DATABASE_URL
        volumeMounts:
        - name: app-code
          mountPath: /app
        livenessProbe:
          httpGet:
            path: /health
            port: 5000
          initialDelaySeconds: 10
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 5000
          initialDelaySeconds: 5
          periodSeconds: 5
        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            cpu: 200m
            memory: 256Mi
      volumes:
      - name: app-code
        configMap:
          name: demo-app-config
          defaultMode: 0555
