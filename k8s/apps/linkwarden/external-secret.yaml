apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: linkwarden-credentials
  namespace: linkwarden
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: gcpsm-cluster-secret-store
    kind: ClusterSecretStore
  target:
    name: linkwarden-credentials
    creationPolicy: Owner
  data:
    - secretKey: database_url
      remoteRef:
        key: linkwarden-database-url
    - secretKey: nextauth_secret
      remoteRef:
        key: linkwarden-nextauth-secret
    - secretKey: nextauth_url
      remoteRef:
        key: linkwarden-nextauth-url
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: linkwarden-postgres-credentials
  namespace: linkwarden
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: gcpsm-cluster-secret-store
    kind: ClusterSecretStore
  target:
    name: linkwarden-postgres-credentials
    creationPolicy: Owner
  data:
    - secretKey: username
      remoteRef:
        key: linkwarden-postgres-user
    - secretKey: password
      remoteRef:
        key: linkwarden-postgres-password
    - secretKey: database
      remoteRef:
        key: linkwarden-postgres-db
